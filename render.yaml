services:
  - type: web
    name: leadcheck
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: POSTHOG_API_KEY
        sync: false
      - key: GHL_WEBHOOK_URL
        sync: false
