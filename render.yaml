services:
  - type: web
    name: leadcheck
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: POSTHOG_API_KEY
        sync: false
      - key: GHL_WEBHOOK_URL
        sync: false
      - key: SUPPORT_WEBHOOK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL_TO
        sync: false
      - key: SUPPORT_EMAIL_FROM
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_PROFESSIONAL_PRICE_ID
        sync: false
      - key: STRIPE_GROWTH_PRICE_ID
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: APP_URL
        sync: false
